<!DOCTYPE html>
<html lang="es">
<head>
    <title>Ejercicio 7</title>
</head>
<body>
    <script>
        // Ejercicio 7: Operadores de comparación
        alert(5 == '5')
        alert(5 === '5')
        alert(5 !== '5')
        alert(10 > 5)
        alert(10 < 5)
        alert(5 >= 5)
        alert(5 <= 5)
        // Operadores lógicos
        alert(true && false)
        alert(true || false)
        alert(!true)
    </script>
    
</body>
</html>
