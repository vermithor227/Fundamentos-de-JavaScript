<!DOCTYPE html>
<html lang="es">
<head>
    <title>Ejercicio 9</title>
    <script>
        // Ejercicio 9: Bucle for
        // Sintaxis: for (inicio; condicion; actualizacion)
        for (let i = 1; i <= 5; i++) {
            alert(`Iteracion numero ${i}`)
        }
        // Contar hacia atras
        for (let i = 5; i >= 1; i--) {
            alert(`conteo regresiva ${i}`)
        }
        //Tabla de multiplicacion del 7
        for (let i = 1; i <= 10; i++) {
            alert(`7 x ${i} = ${7 * i}`)
        }
    </script>
</head>
<body>
    
</body>
</html>
