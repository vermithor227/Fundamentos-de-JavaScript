<!DOCTYPE html>
<html lang="es">
<head>

    <title>Ejercicio 4</title>

</head>
<body>
    <script>
        // Ejercicio 4: Operadores aritmeticos
        let a = 10
        let b = 3
        alert(a + b)
        alert(a - b)
        alert(a * b)
        alert(a / b)
        alert(a % b)
        alert(a ** b)
        // Incremento y decremento
        let contador = 5
        contador++
        contador--
        alert(contador)
    </script>
    
</body>
</html>
