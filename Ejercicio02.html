<body>
    <script>
        // Ejercicio 2: Variables
        let nombre = "Sebastian"
        const edad = 20
        let puntuacion = 25
        let puntuacionMaxima = 100
        // Imprimir el nombre y la edad
        alert("Nombre: " + nombre)
        alert("Edad: " + edad)
        // Calcular el porcentaje de puntuación
        let porcentaje = (puntuacion / puntuacionMaxima) * 100
        alert("Puntuación: " + porcentaje + "%")
    </script>
