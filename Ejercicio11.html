    <script>
        //Ejercicio 11: Arrays
        const frutas = ["Manzanas", "banana", "naranja", "uva"]
        
        console.log(frutas[0])
        console.log(frutas[3])

        frutas.pop()
        
        console.log(frutas)
    </script>
