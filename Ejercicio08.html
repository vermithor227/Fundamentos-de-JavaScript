<!DOCTYPE html>
<html lang="es">
<head>
    <title>Ejercicio 8</title>
</head>
<body>
    <script>
        // Ejercicio 8: switch
        const dia = 3
        let nombreDia
        switch (dia) {
            case 1:
                nombreDia = 'Lunes'
                break
            case 2:
                nombreDia = 'Martes'
                break
            case 3:
                nombreDia = 'Miércoles'
                break
            case 4:
                nombreDia = 'Jueves'
                break
            case 5:
                nombreDia = 'Viernes'
                break
            case 6:
                nombreDia = 'Sábado'
                break
            case 7:
                nombreDia = 'Domingo'
                break
            default:
                nombreDia = 'Número de día inválido'
        }
        console.log(nombreDia)
    </script>
    
</body>
</html>
