<!DOCTYPE html>
<html lang="en">
<head>

   <title>Ejercicio 5</title>

</head>
<body>
    <script>
        // Ejercicio 5: Template Literals
        const nombre = "Sebastian"
        const edad = 20
        const altura = 1.77
        // Forma moderna (Template Literals)
        alert(`Hola, mi nombre es ${nombre}, tengo ${edad} años y mido ${altura} metros.`)
        // Tambien puedes poner expresiones
        alert(`En 5 años tendre ${edad + 5} años.`)
        alert(`Altura en cm: ${altura * 100} cm.`)
    </script>
    
</body>
</html>
