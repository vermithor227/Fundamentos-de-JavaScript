<!DOCTYPE html>
<html lang="ens">
<head>
    <title>Ejercicio 13</title>
</head>
<body>
    <script>
        // Ejercicio 13: Funciones
        function saludar(nombre) {
            return '¡Hola, ' + nombre + '!'
        }

        function sumar(a, b) {
            return a + b
        }

        function espar(numero) {
            return numero % 2 === 0
        }

        // Llamar (invocar) las funciones 
        alert(saludar("Sebastian"))
        alert(sumar(3, 7))
        alert(espar(4))
        alert(espar(7))
    </script>
    
</body>
</html>
